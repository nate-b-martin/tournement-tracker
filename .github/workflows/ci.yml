name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Run lint and type checks
        run: npm run check || true

      - name: Build
        run: npm run build

      - name: Detect unit tests
        id: detect_unit
        run: |
          set -eo pipefail
          # look for common test filename patterns
          if git ls-files -- "**/*.test.*" "**/*.spec.*" | grep -q .; then
            echo "has_unit=true" >> $GITHUB_OUTPUT
          else
            echo "has_unit=false" >> $GITHUB_OUTPUT
          fi

      - name: Run unit tests (Vitest)
        if: ${{ steps.detect_unit.outputs.has_unit == 'true' }}
        run: npm run test

      - name: Check for e2e script
        id: check_e2e
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json')); const has=Boolean(pkg.scripts && (pkg.scripts['test:e2e'] || pkg.scripts.e2e)); process.stdout.write(has? 'true':'false');" > has_e2e.txt
          echo "has_e2e=$(cat has_e2e.txt)" >> $GITHUB_OUTPUT

      - name: Start local Convex (for e2e)
        if: ${{ steps.check_e2e.outputs.has_e2e == 'true' }}
        run: |
          echo "Starting Convex dev on port 8787"
          npx convex dev --port 8787 &> convex.log & echo $! > convex.pid
          # wait for convex to be reachable
          for i in $(seq 1 60); do
            if bash -c 'cat < /dev/tcp/127.0.0.1/8787 >/dev/null 2>&1'; then
              echo "Convex is up"
              break
            fi
            echo "Waiting for Convex... ($i)"
            sleep 1
          done
          tail -n +1 convex.log | sed -n '1,200p'

      - name: Seed Convex (optional)
        if: ${{ steps.check_e2e.outputs.has_e2e == 'true' }}
        run: |
          npx convex seed || true

      - name: Export Convex and Clerk env for e2e
        if: ${{ steps.check_e2e.outputs.has_e2e == 'true' }}
        run: |
          echo "VITE_CONVEX_URL=http://127.0.0.1:8787" >> $GITHUB_ENV
          echo "VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}" >> $GITHUB_ENV
          echo "CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}" >> $GITHUB_ENV

      - name: Run e2e tests (Playwright)
        if: ${{ steps.check_e2e.outputs.has_e2e == 'true' }}
        run: npm run test:e2e
